<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog | Adityagopala Poolla</title>

  <!-- Fonts: Inter for headings/UI, Source Serif 4 for body (Medium-style), JetBrains Mono for code -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Markdown + syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

  <!-- Embedded blog data (works under file:// without fetch) -->
  <script src="js/posts-data.js"></script>

  <style>
    /* ===========================================
       Medium-style reading view — light, calm, readable
       =========================================== */

    :root {
      --paper:       #ffffff;
      --ink:         #242424;
      --ink-soft:    #3d3d3d;
      --ink-muted:   #6b6b6b;
      --rule:        #e6e6e6;
      --rule-soft:   #f0f0f0;
      --code-bg:     #f7f7f5;
      --code-border: #ececec;
      --accent:      #1a8917;        /* Medium-ish green */
      --accent-soft: #e8f4e6;
      --link:        #1a73e8;
      --selection:   #d9efff;

      --font-ui:     'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-read:   'Source Serif 4', Charter, 'Iowan Old Style', 'Apple Garamond',
                     Georgia, 'Times New Roman', serif;
      --font-mono:   'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-read);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: "liga", "kern";
    }

    ::selection { background: var(--selection); color: var(--ink); }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: saturate(180%) blur(10px);
      border-bottom: 1px solid var(--rule);
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      font-family: var(--font-ui);
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--ink);
      text-decoration: none;
      font-size: 1.05rem;
    }
    .brand .dot { color: var(--accent); }

    .top-links {
      display: flex;
      gap: 22px;
      align-items: center;
    }
    .top-links a {
      font-family: var(--font-ui);
      font-size: 0.92rem;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color 0.15s;
    }
    .top-links a:hover { color: var(--accent); }

    /* ── ARTICLE LAYOUT ── */
    .blog-page {
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 96px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      margin-bottom: 36px;
      transition: color 0.15s, gap 0.15s;
    }
    .back-link:hover { color: var(--ink); gap: 10px; }

    /* ── POST HEADER ── */
    .post-header {
      margin-bottom: 40px;
    }
    .post-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .post-tag {
      padding: 4px 12px;
      border-radius: 100px;
      font-family: var(--font-ui);
      font-size: 0.78rem;
      font-weight: 500;
      background: #f2f2f0;
      color: var(--ink-soft);
      border: none;
    }
    .post-title {
      font-family: var(--font-ui);
      font-size: clamp(1.9rem, 4.6vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.8px;
      color: var(--ink);
      line-height: 1.18;
      margin-bottom: 18px;
    }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-ui);
      font-size: 0.92rem;
      color: var(--ink-muted);
    }
    .post-meta .author {
      color: var(--ink-soft);
      font-weight: 500;
    }
    .post-meta .sep {
      color: var(--rule);
    }

    /* ── ARTICLE BODY (Medium-style serif reading) ── */
    .post-body {
      color: var(--ink);
      font-family: var(--font-read);
      font-size: 1.22rem;     /* ~20px, the Medium sweet spot */
      line-height: 1.72;
      letter-spacing: -0.003em;
    }

    .post-body > * + * { margin-top: 1.4em; }

    .post-body p {
      color: #292929;
    }

    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      font-family: var(--font-ui);
      color: var(--ink);
      font-weight: 700;
      letter-spacing: -0.4px;
      line-height: 1.3;
    }
    .post-body h2 {
      font-size: 1.7rem;
      margin-top: 2.2em;
      margin-bottom: 0.4em;
    }
    .post-body h3 {
      font-size: 1.32rem;
      margin-top: 1.8em;
      margin-bottom: 0.3em;
    }
    .post-body h4 {
      font-size: 1.1rem;
      margin-top: 1.5em;
    }

    .post-body strong {
      font-weight: 700;
      color: var(--ink);
    }
    .post-body em { font-style: italic; }

    .post-body a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-color: var(--ink-muted);
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: color 0.15s, text-decoration-color 0.15s;
    }
    .post-body a:hover {
      color: var(--accent);
      text-decoration-color: var(--accent);
    }

    /* ── INLINE CODE ── */
    .post-body code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      padding: 2px 6px;
      color: #c7254e;
    }

    /* ── CODE BLOCKS ── */
    .post-body pre {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 8px;
      padding: 20px 22px;
      overflow-x: auto;
      margin: 1.6em 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.92rem;
      color: #383a42;
      font-family: var(--font-mono);
    }

    /* ── BLOCKQUOTE ── */
    .post-body blockquote {
      border-left: 3px solid var(--ink);
      padding: 4px 0 4px 22px;
      margin: 1.6em 0;
      color: var(--ink-soft);
      font-style: italic;
      font-size: 1.18rem;
    }
    .post-body blockquote p { color: var(--ink-soft); }

    /* ── LISTS ── */
    .post-body ul,
    .post-body ol {
      padding-left: 28px;
      color: #292929;
    }
    .post-body li {
      margin-bottom: 0.5em;
    }
    .post-body li > p { margin-top: 0.4em; }

    /* ── HORIZONTAL RULE ── */
    .post-body hr {
      border: none;
      text-align: center;
      margin: 2.5em 0;
      height: 24px;
      position: relative;
    }
    .post-body hr::after {
      content: "• • •";
      color: var(--ink-muted);
      letter-spacing: 0.5em;
      font-size: 1rem;
    }

    /* ── IMAGES & TABLES ── */
    .post-body img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 1.6em 0;
    }
    .post-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.6em 0;
      font-family: var(--font-ui);
      font-size: 0.95rem;
    }
    .post-body th,
    .post-body td {
      border-bottom: 1px solid var(--rule);
      padding: 10px 14px;
      text-align: left;
    }
    .post-body th {
      background: var(--rule-soft);
      font-weight: 600;
    }

    /* ── POST FOOTER ── */
    .post-footer {
      margin-top: 64px;
      padding-top: 28px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      font-family: var(--font-ui);
      font-size: 0.92rem;
      color: var(--ink-muted);
    }
    .post-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .post-footer a:hover { text-decoration: underline; }

    /* ── LOADING STATE ── */
    .post-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 0;
      color: var(--ink-muted);
      font-family: var(--font-ui);
      font-size: 0.95rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .post-error {
      padding: 60px 0;
      text-align: center;
      color: var(--ink-muted);
      font-family: var(--font-ui);
    }
    .post-error h2 {
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 8px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .topbar-inner { padding: 12px 18px; }
      .blog-page { padding: 40px 18px 64px; }
      .post-body { font-size: 1.12rem; }
      .post-body h2 { font-size: 1.45rem; }
      .post-body h3 { font-size: 1.18rem; }
      .post-body pre { padding: 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">AP<span class="dot">.</span></a>
      <nav class="top-links">
        <a href="index.html#blogs">All Posts</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Article -->
  <main class="blog-page">
    <a href="index.html#blogs" class="back-link">← All posts</a>
    <article id="post-container">
      <div class="post-loading">
        <div class="spinner"></div>
        <span>Loading post…</span>
      </div>
    </article>
  </main>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const file   = params.get('post');
      const container = document.getElementById('post-container');

      if (!file) {
        container.innerHTML = `
          <div class="post-error">
            <h2>No post specified</h2>
            <p>Head back to <a href="index.html#blogs">all posts</a>.</p>
          </div>`;
        return;
      }

      // Loader: prefer embedded data (works under file://); fall back to fetch.
      async function loadPost(targetFile) {
        if (Array.isArray(window.BLOG_POSTS) && window.BLOG_POSTS.length) {
          const meta = window.BLOG_POSTS.find(p => p.file === targetFile);
          if (meta && typeof meta.content === 'string') {
            return { meta, md: meta.content };
          }
        }
        const idxRes = await fetch('blogs/index.json');
        const posts  = await idxRes.json();
        const meta   = posts.find(p => p.file === targetFile) || {};
        const mdRes  = await fetch(`blogs/${targetFile}`);
        if (!mdRes.ok) throw new Error('Post not found');
        const md = await mdRes.text();
        return { meta, md };
      }

      try {
        const { meta, md } = await loadPost(file);

        document.title = `${meta.title || 'Post'} | Adityagopala Poolla`;

        // Strip the leading H1 from markdown — we render the title in the header
        const body = md.replace(/^#\s+.+\n+/, '');

        // Estimate read time (~225 wpm)
        const words = body.trim().split(/\s+/).length;
        const readTime = Math.max(1, Math.round(words / 225));

        const dateStr = meta.date
          ? new Date(meta.date).toLocaleDateString('en-US',
              { year:'numeric', month:'long', day:'numeric' })
          : '';

        container.innerHTML = `
          <header class="post-header">
            <div class="post-tags">
              ${(meta.tags || []).map(t => `<span class="post-tag">${t}</span>`).join('')}
            </div>
            <h1 class="post-title">${meta.title || ''}</h1>
            <div class="post-meta">
              <span class="author">Adityagopala Poolla</span>
              <span class="sep">·</span>
              <span>${readTime} min read</span>
              ${dateStr ? `<span class="sep">·</span><span>${dateStr}</span>` : ''}
            </div>
          </header>
          <div class="post-body">${marked.parse(body)}</div>
          <footer class="post-footer">
            <span>Thanks for reading.</span>
            <a href="index.html#blogs">← Back to all posts</a>
          </footer>
        `;

        // Apply syntax highlighting
        if (window.hljs) {
          document.querySelectorAll('.post-body pre code').forEach(el => {
            window.hljs.highlightElement(el);
          });
        }
      } catch (e) {
        container.innerHTML = `
          <div class="post-error">
            <h2>Post not found</h2>
            <p>We couldn't load that post. Try <a href="index.html#blogs">browsing all posts</a>.</p>
          </div>`;
      }
    })();
  </script>
</body>
</html>
